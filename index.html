<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supervisor Access Control</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: #ffffff;
}

.card {
  max-width: 700px;
  margin: 60px auto;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 25px;
  backdrop-filter: blur(10px);
}

h2 { margin-bottom: 10px; }

p { color: #c9d1d9; }

input {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.35);
  color: white;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #0078d4;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  background: #0a5ea8;
}

.switch {
  position: relative;
  display: inline-block;
  width: 48px;
  height: 26px;
}

.switch input { opacity: 0; width: 0; height: 0; }

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #3a3f4b;
  transition: .3s;
  border-radius: 26px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  transition: .3s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #22c55e;
}

input:checked + .slider:before {
  transform: translateX(22px);
}

.row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 15px;
}

pre {
  margin-top: 20px;
  background: #0a0f1a;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  color: #00ff88;
  overflow-x: auto;
}

#stateLabel {
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

  <h2>Supervisor Access Control</h2>
  <p>Conscia Support Demo</p>

  <div class="row">
    <label class="switch">
      <input type="checkbox" id="emergencyToggle">
      <span class="slider"></span>
    </label>

    <span>Emergency Case: <span id="stateLabel">OFF</span></span>
  </div>

  <input id="prompt" placeholder="Please enter new prompt text">

  <button onclick="sendUpdate()">Update Channel</button>

  <pre id="output">Loading...</pre>

</div>

<script>
const API_URL = "https://wxcc-backend.onrender.com";
const ENTRY_POINT_ID = "284cd09a-eef4-40a2-82c6-53d08705e3e3";

// =========================
// INIT LOAD (GET)
// =========================
async function loadEntryPoint() {
  try {
    const res = await fetch(`${API_URL}/entrypoint/${ENTRY_POINT_ID}`);
    const data = await res.json();

    console.log("GET EntryPoint:", data);

    if (!data?.flowOverrideSettings) {
      document.getElementById("output").textContent =
        "No flowOverrideSettings found";
      return;
    }

    // Extract values
    const emergencyCase = data.flowOverrideSettings.find(x => x.name === "EmergencyCase");
    const emergencyPrompt = data.flowOverrideSettings.find(x => x.name === "EmergencyPrompt");

    const isOn = emergencyCase?.value === "true";

    // Set UI state
    document.getElementById("emergencyToggle").checked = isOn;
    document.getElementById("stateLabel").innerText = isOn ? "ON" : "OFF";
    document.getElementById("prompt").value = emergencyPrompt?.value || "";

    document.getElementById("output").textContent =
      JSON.stringify(data, null, 2);

  } catch (err) {
    console.error(err);
    document.getElementById("output").textContent =
      "GET error: " + err.message;
  }
}

// =========================
// UI UPDATE
// =========================
document.getElementById("emergencyToggle").addEventListener("change", () => {
  const state = document.getElementById("emergencyToggle").checked;
  document.getElementById("stateLabel").innerText = state ? "ON" : "OFF";
});

// =========================
// PUT UPDATE
// =========================
async function sendUpdate() {
  const EmergencyCase = document.getElementById("emergencyToggle").checked;
  const EmergencyPrompt = document.getElementById("prompt").value;

  try {
    document.getElementById("output").textContent = "Updating...";

    const res = await fetch(`${API_URL}/entrypoint/${ENTRY_POINT_ID}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        EmergencyCase,
        EmergencyPrompt
      })
    });

    const data = await res.json();

    document.getElementById("output").textContent =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").textContent =
      "PUT error: " + err.message;
  }
}

// INIT
loadEntryPoint();
</script>

</body>
</html>
