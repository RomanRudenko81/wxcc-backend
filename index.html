<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supervisor Access Control</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

.card {
  max-width: 700px;
  margin: 60px auto;
  padding: 25px;
  background: rgba(255,255,255,0.06);
  border-radius: 14px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #0078d4;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #0a5ea8;
}

.row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.switch input {
  transform: scale(1.5);
}

pre {
  margin-top: 20px;
  background: #0a0f1a;
  padding: 10px;
  border-radius: 10px;
  color: #00ff88;
  overflow: auto;
}
</style>
</head>

<body>

<div class="card">

<h2>Supervisor Access Control</h2>

<div class="row">
  <label class="switch">
    <input type="checkbox" id="toggle">
  </label>
  <span>Emergency Case: <span id="label">OFF</span></span>
</div>

<input id="prompt" placeholder="Emergency Prompt">

<button onclick="update()">Update</button>

<pre id="output">Loading...</pre>

</div>

<script>

const API_URL = "https://wxcc-backend.onrender.com";
const ENTRY_ID = "284cd09a-eef4-40a2-82c6-53d08705e3e3";

// ======================
// LOAD DATA (GET)
// ======================
async function load() {
  try {
    const res = await fetch(`${API_URL}/entrypoint/${ENTRY_ID}`);
    const data = await res.json();

    const overrides = data.flowOverrideSettings || [];

    const emergency = overrides.find(x => x.name === "EmergencyCase");
    const prompt = overrides.find(x => x.name === "EmergencyPrompt");

    const state = emergency?.value === "true";

    document.getElementById("toggle").checked = state;
    document.getElementById("label").innerText = state ? "ON" : "OFF";
    document.getElementById("prompt").value = prompt?.value || "";

    document.getElementById("output").textContent =
      JSON.stringify(data, null, 2);

  } catch (e) {
    document.getElementById("output").textContent =
      "ERROR: " + e.message;
  }
}

// ======================
// UPDATE (PUT)
// ======================
async function update() {
  const EmergencyCase = document.getElementById("toggle").checked;
  const EmergencyPrompt = document.getElementById("prompt").value;

  const res = await fetch(`${API_URL}/entrypoint/${ENTRY_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      EmergencyCase,
      EmergencyPrompt
    })
  });

  const data = await res.json();

  document.getElementById("output").textContent =
    JSON.stringify(data, null, 2);
}

document.getElementById("toggle").addEventListener("change", (e) => {
  document.getElementById("label").innerText =
    e.target.checked ? "ON" : "OFF";
});

load();

</script>

</body>
</html>
