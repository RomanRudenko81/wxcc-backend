<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supervisor Access Control</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: #ffffff;
}

.card {
  max-width: 700px;
  margin: 60px auto;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 25px;
  backdrop-filter: blur(10px);
}

h2 { margin-bottom: 10px; }
p { color: #c9d1d9; }

.switch {
  position: relative;
  display: inline-block;
  width: 48px;
  height: 26px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background-color: #3a3f4b;
  transition: .3s;
  border-radius: 26px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  transition: .3s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #22c55e;
}

input:checked + .slider:before {
  transform: translateX(22px);
}

.row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 15px;
}

.input-group {
  display: flex;
  gap: 8px;
  flex: 1;
}

input[type="text"],
#prompt {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.35);
  color: white;
  outline: none;
}

.small-btn {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #0078d4;
  color: white;
  font-size: 13px;
  cursor: pointer;
  width: auto;
}

.small-btn:hover {
  background: #0a5ea8;
}

pre {
  margin-top: 20px;
  background: #0a0f1a;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  color: #00ff88;
  overflow-x: auto;
}

#stateLabel {
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

  <h2>Supervisor Access Control</h2>
  <p>Conscia Support Demo</p>

  <div class="row">
    <label class="switch">
      <input type="checkbox" id="emergencyToggle" onchange="toggleEmergency()">
      <span class="slider"></span>
    </label>

    <span>
      Emergency Case: <span id="stateLabel">OFF</span>
    </span>
  </div>

  <div class="row">
    <div class="input-group">
      <input id="prompt" type="text" placeholder="Enter emergency prompt...">
      <button class="small-btn" onclick="updatePrompt()">Save</button>
    </div>
  </div>

  <pre id="output">Loading...</pre>

</div>

<script>
const API_URL = "https://wxcc-backend.onrender.com";
const ENTRY_POINT_ID = "284cd09a-eef4-40a2-82c6-53d08705e3e3";
const POLL_INTERVAL_MS = 5000;

let isUpdating = false;
let pollHandle = null;

/* INIT */
window.onload = async function () {
  await loadEntryPoint(true);
  startPolling();
};

/* CLEANUP */
window.onbeforeunload = function () {
  if (pollHandle) {
    clearInterval(pollHandle);
  }
};

/* POLLING */
function startPolling() {
  if (pollHandle) {
    clearInterval(pollHandle);
  }

  pollHandle = setInterval(async () => {
    if (isUpdating) return;
    await loadEntryPoint(false);
  }, POLL_INTERVAL_MS);
}

/* GET */
async function loadEntryPoint(updateOutput = true) {
  try {
    const res = await fetch(`${API_URL}/entrypoint/${ENTRY_POINT_ID}`);
    const data = await res.json();

    const toggle = document.getElementById("emergencyToggle");
    const promptInput = document.getElementById("prompt");

    const emergencyCase =
      typeof data.emergencyCase === "boolean"
        ? data.emergencyCase
        : false;

    const emergencyPrompt =
      typeof data.emergencyPrompt === "string"
        ? data.emergencyPrompt
        : "";

    toggle.checked = emergencyCase;
    updateLabel();

    const isTypingInPrompt = document.activeElement === promptInput;
    if (!isTypingInPrompt) {
      promptInput.value = emergencyPrompt;
    }

    if (updateOutput) {
      document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
    }

  } catch (err) {
    document.getElementById("output").textContent =
      "Load error: " + err.message;
  }
}

/* LABEL */
function updateLabel() {
  const state = document.getElementById("emergencyToggle").checked;
  document.getElementById("stateLabel").innerText = state ? "ON" : "OFF";
}

/* AUTO UPDATE TOGGLE */
async function toggleEmergency() {
  updateLabel();

  const EmergencyCase = document.getElementById("emergencyToggle").checked;
  const EmergencyPrompt = document.getElementById("prompt").value;

  try {
    isUpdating = true;
    document.getElementById("output").textContent = "Updating toggle...";

    const res = await fetch(`${API_URL}/entrypoint/${ENTRY_POINT_ID}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        EmergencyCase,
        EmergencyPrompt
      })
    });

    const data = await res.json();

    document.getElementById("output").textContent =
      JSON.stringify(data, null, 2);

    await loadEntryPoint(false);

  } catch (err) {
    document.getElementById("output").textContent =
      "Toggle update error: " + err.message;
  } finally {
    isUpdating = false;
  }
}

/* PROMPT UPDATE */
async function updatePrompt() {
  const EmergencyCase = document.getElementById("emergencyToggle").checked;
  const EmergencyPrompt = document.getElementById("prompt").value;

  try {
    isUpdating = true;
    document.getElementById("output").textContent = "Saving prompt...";

    const res = await fetch(`${API_URL}/entrypoint/${ENTRY_POINT_ID}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        EmergencyCase,
        EmergencyPrompt
      })
    });

    const data = await res.json();

    document.getElementById("output").textContent =
      JSON.stringify(data, null, 2);

    await loadEntryPoint(false);

  } catch (err) {
    document.getElementById("output").textContent =
      "Prompt update error: " + err.message;
  } finally {
    isUpdating = false;
  }
}
</script>

</body>
</html>
