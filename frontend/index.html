<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supervisor Access Control</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="card">
    <h2>Supervisor Access Control</h2>
    <p>Conscia Support Demo</p>

    <div class="info-row">
      <span id="userInfo">Loading user context...</span>
      <span id="roleBadge" class="role-badge">...</span>
    </div>

    <div class="row">
      <label class="switch">
        <input type="checkbox" id="emergencyToggle" onchange="toggleEmergency()">
        <span class="slider"></span>
      </label>

      <span>
        Emergency Case: <span id="stateLabel">OFF</span>
      </span>
    </div>

    <div class="row">
      <div class="input-group">
        <input id="prompt" type="text" placeholder="Enter emergency prompt...">
        <button class="small-btn" id="saveBtn" onclick="updatePrompt()">Save</button>
      </div>
    </div>

    <pre id="output">Loading...</pre>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
